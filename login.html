<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opersan - Análise Inteligente de Contratos</title>
    <link rel="stylesheet" href="login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <main class="content">
            <!-- Lado Esquerdo -->
            <section class="info-section">
                <div class="logo">
                    <div class="logo-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>
                    </div>
                    <h1>Opersan</h1>
                </div>
                <div class="hero-text">
                    <h2>Análise Inteligente <span class="highlight">de Contratos</span></h2>
                    <p>Otimize sua revisão jurídica com IA avançada. Faça perguntas em linguagem natural e obtenha insights instantâneos sobre seus documentos.</p>
                </div>
                <div class="stats-container">
                    <div class="stat-card">
                        <span class="stat-value">10x</span>
                        <span class="stat-label">Mais rápido</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value">99%</span>
                        <span class="stat-label">Precisão</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value">24/7</span>
                        <span class="stat-label">Disponível</span>
                    </div>
                </div>
            </section>

            <!-- Lado Direito: Formulário de Login -->
            <section class="login-section">
                <div class="login-card" id="loginCard">
                    <h3>Entrar</h3>
                    <p class="subtitle">Acesse sua conta para continuar</p>

                    <form id="loginform">
                        <div class="input-group">
                            <label for="email">Email</label>
                            <div class="input-wrapper">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                                <input id="email" type="email" placeholder="seu@email.com" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="password">Senha</label>
                            <div class="input-wrapper">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                                <input type="password" id="password" placeholder="••••••••" required>
                            </div>
                        </div>

                        <button type="submit" class="btn-submit">
                            Entrar
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></svg>
                        </button>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script src="login.js"></script>
</body>
</html>
