services:
  - type: web
    name: opersan-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///contratos_v2.dbservices:
  - type: web
    name: opersan-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # você vai preencher manualmente no painel
      - key: DATABASE_URL
        fromDatabase:
          name: opersan-db   # mesmo nome que você deu ao PostgreSQL
          property: connectionString

databases:
  - name: opersan-db
    plan: free