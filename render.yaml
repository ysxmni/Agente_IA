# ═══════════════════════════════════════════════════════════════
#  render.yaml — Opersan
#  Deploy completo: backend Python + banco PostgreSQL
# ═══════════════════════════════════════════════════════════════

services:
  - type: web
    name: opersan-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    # Variáveis de ambiente
    envVars:
      - key: GEMINI_API_KEY
        sync: false           # preencha manualmente no painel do Render

      - key: DATABASE_URL
        fromDatabase:
          name: opersan-db    # mesmo nome do banco abaixo
          property: connectionString

      # Garante que o SQLAlchemy use o driver correto para PostgreSQL
      - key: PYTHONUNBUFFERED
        value: "1"

# ── Banco de dados PostgreSQL (gratuito no plano free) ──────────
databases:
  - name: opersan-db
    plan: free
    databaseName: opersan
    user: opersan